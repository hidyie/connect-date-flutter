name: connect_date
description: "HeartLink - AI-powered dating app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_card_swiper: ^7.0.1

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Backend
  supabase_flutter: ^2.8.4

  # Firebase
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.4

  # Local Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.5
  hive_flutter: ^1.1.0

  # Location
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Media
  image_picker: ^1.1.2
  image_cropper: ^8.0.2
  record: ^5.1.2
  audioplayers: ^6.1.0

  # In-App Purchase
  in_app_purchase: ^3.2.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
